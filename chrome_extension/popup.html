<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; padding: 10px; font-family: sans-serif; }
    textarea { width: 100%; height: 80px; }
    button { margin-top: 10px; width: 100%; }
    #response { margin-top: 10px; white-space: pre-wrap; font-size: 0.9em; }
  </style>
</head>
<body>
  <h3>AI Ops Assistant</h3>
  <textarea id="prompt" placeholder="Ask something..."></textarea>
  <select id="provider">
    <option value="ollama">Ollama (Local)</option>
    <option value="google">Google Gemini</option>
  </select>
  <button id="ask">Ask AI</button>
  <div id="response"></div>
  <script src="popup.js"></script>
</body>
</html>
